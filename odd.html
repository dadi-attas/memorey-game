<!DOCTYPE html>

<head>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>рЯОѓ</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff; user-select: none; touch-action: manipulation;
  }
  #app {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    padding: 12px; gap: 10px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex: 0 0 auto; height: 58px;
  }
  .btn {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.35);
    color: #fff; padding: 11px 20px;
    font-size: 17px; font-weight: 700;
    border-radius: 12px; cursor: pointer;
    transition: transform 0.08s, background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.3); }
  .btn:active { transform: scale(0.94); }
  .btn.hidden { visibility: hidden; }
  .info {
    flex: 1 1 auto; display: flex; justify-content: center; align-items: center;
    gap: 28px; font-size: 20px; font-weight: 600;

  }

  }

  #board-wrap {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    min-height: 0; min-width: 0;
    padding: 4px;
  }
  #board {
    display: grid;
    gap: var(--gap, 14px);
  }

  .card {
    background: #fff;
    color: #222;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    border: 3px solid rgba(255, 255, 255, 0.35);
    transition: transform 0.1s, box-shadow 0.15s, background 0.2s;
    font-size: var(--emoji-size, 60px);
  }
  .card:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.45);
  }
  .card:active { transform: scale(0.96); }
  .card.empty { visibility: hidden; pointer-events: none; }
  .card.locked { cursor: default; pointer-events: none; }

  .card.correct {
    background: #a8e6a1; color: #14532d;
    animation: pulseGreen 0.8s ease;
  }
  .card.wrong {
    background: #ffb3b3; color: #7a1a1a;
    animation: shake 0.5s ease;
  }
  @keyframes pulseGreen {
    0% { box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35); }
    50% { box-shadow: 0 0 35px rgba(86, 195, 77, 0.9); transform: scale(1.06); }
    100% { box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  #overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 30px 44px; border-radius: 22px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .modal .emoji { font-size: 64px; margin-bottom: 10px; }
  .modal h2 { font-size: 30px; margin-bottom: 10px; }
  .modal p { font-size: 18px; margin-bottom: 20px; opacity: 0.95; }
  .modal .btn { background: #fff; color: #333; font-size: 18px; padding: 12px 28px; }
  .modal .btn:hover { background: #ffd86b; }

  .btn-end {
    background: linear-gradient(135deg, #ff8a8a 0%, #e55b5b 100%) !important;
    border-color: rgba(255,255,255,0.55) !important;
    color: #fff !important;
  }
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; backdrop-filter: blur(4px);
  }
  .end-modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 28px 38px; border-radius: 20px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: #fff;
  }
  .end-modal h2 { font-size: 28px; margin-bottom: 18px; font-weight: 800; }
  .end-modal .ebtns { display: flex; gap: 14px; justify-content: center; }
  .end-modal button {
    padding: 12px 30px; font-size: 18px; font-weight: 800;
    border-radius: 12px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.55);
    font-family: inherit;
  }
  .end-modal button.yes { background: #7dd87d; color: #fff; }
  .end-modal button.no  { background: #fff; color: #333; }
  .goodbye {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff;
    z-index: 99999;
  }
  .goodbye .wave { font-size: 110px; margin-bottom: 12px; }
  .goodbye .text { font-size: 46px; font-weight: 800; }
</style>

</div>

<div id="overlay">
  <div class="modal">
    <div class="emoji" id="modal-emoji">в≠Р</div>
    <h2 id="modal-title">„Ю„¶„Х„Щ„Я!</h2>

</div>

<script>
const LEVELS = [
  { cards: 4,  cols: 2, rows: 2 },
  { cards: 5,  cols: 3, rows: 2 },
  { cards: 6,  cols: 3, rows: 2 },
  { cards: 7,  cols: 4, rows: 2 },
  { cards: 8,  cols: 4, rows: 2 },
  { cards: 9,  cols: 3, rows: 3 },
  { cards: 10, cols: 5, rows: 2 },
];

// Each category has a "super" group. Outlier is picked from a different super.
const CATEGORIES = [
  { super: 'food',   items: ['рЯНО','рЯНК','рЯНЛ','рЯНМ','рЯНЙ','рЯНЗ','рЯНУ','рЯНС','рЯНТ','рЯ•Э','рЯНН','рЯ•≠','рЯНИ','рЯ••','рЯНР','рЯНП'] },
  { super: 'food',   items: ['рЯ•Х','рЯМљ','рЯ•Ф','рЯ•Т','рЯ•ђ','рЯ•¶','рЯЂС','рЯІЕ','рЯІД','рЯНЕ','рЯМґпЄП','рЯНЖ'] },
  { super: 'food',   items: ['рЯНФ','рЯНЯ','рЯМ≠','рЯНХ','рЯМЃ','рЯМѓ','рЯ•Щ','рЯ•™','рЯНЭ','рЯ•Ц'] },
  { super: 'food',   items: ['рЯН∞','рЯОВ','рЯІБ','рЯ•І','рЯН©','рЯН™','рЯНЂ','рЯНђ','рЯН≠','рЯН¶','рЯН®','рЯНІ'] },
  { super: 'food',   items: ['вШХ','рЯНµ','рЯІГ','рЯ•§','рЯ•Ы'] },
  { super: 'animal', items: ['рЯРґ','рЯР±','рЯР≠','рЯРє','рЯР∞','рЯРї','рЯРЉ','рЯ¶Б','рЯРѓ','рЯ¶К','рЯРЃ','рЯРЈ','рЯРµ','рЯ¶Т','рЯРШ','рЯ¶У','рЯРЇ','рЯ¶М','рЯР®','рЯРЧ'] },
  { super: 'animal', items: ['рЯРЩ','рЯ¶А','рЯР≥','рЯРђ','рЯР†','рЯРЯ','рЯ¶И','рЯР°','рЯ¶≠','рЯРЛ','рЯ¶Ю','рЯ¶Р','рЯ¶С'] },
  { super: 'animal', items: ['рЯРФ','рЯРІ','рЯ¶Ж','рЯ¶Е','рЯ¶Й','рЯ¶Ъ','рЯ¶Г','рЯР¶','рЯ¶Ь','рЯХКпЄП','рЯРУ','рЯ¶©'] },
  { super: 'animal', items: ['рЯ¶Л','рЯРЭ','рЯРЮ','рЯРЫ','рЯ¶Ч','рЯРЬ','рЯХЈпЄП','рЯРМ'] },
  { super: 'vehicle',items: ['рЯЪЧ','рЯЪХ','рЯЪЩ','рЯЪМ','рЯЪТ','рЯЪУ','рЯЪС','рЯЪЬ','рЯПНпЄП','рЯЪ≤','рЯЫµ','рЯЪВ','рЯЪЪ','рЯПОпЄП'] },
  { super: 'vehicle',items: ['вЬИпЄП','рЯЪБ','рЯЪА','рЯЫ©пЄП'] },
  { super: 'vehicle',items: ['вЫµ','рЯЪ§','рЯЫ≥пЄП','рЯЪҐ','рЯЫ•пЄП'] },
  { super: 'tool',   items: ['рЯФ®','рЯ™У','рЯФІ','рЯ™Ы','рЯ™Ъ','рЯІ∞','вЫПпЄП','рЯФ©','вЪЩпЄП','рЯ™Ь'] },
  { super: 'music',  items: ['рЯОЄ','рЯОє','рЯОЇ','рЯ•Б','рЯОї','рЯОЈ','рЯ™Х','рЯ™Ч','рЯО§'] },
  { super: 'sport',  items: ['вЪљ','рЯПА','рЯПИ','рЯОЊ','рЯО±','рЯПР','рЯПЙ','вЪЊ','рЯ•О'] },
  { super: 'cloth',  items: ['рЯСХ','рЯСЦ','рЯСЧ','рЯІ•','рЯСФ','рЯІ£','рЯІ§','рЯІ¶','рЯСТ','рЯО©','рЯСШ'] },
  { super: 'cloth',  items: ['рЯСЯ','рЯСЮ','рЯС†','рЯСҐ','рЯ•њ','рЯ•Њ','рЯС°'] },
  { super: 'nature', items: ['вШАпЄП','вЫЕ','вШБпЄП','рЯМІпЄП','вЫИпЄП','вЭДпЄП','вЫД','рЯМИ','рЯМ®пЄП'] },
  { super: 'nature', items: ['рЯМЄ','рЯМє','рЯМЇ','рЯМї','рЯМЉ','рЯМЈ','рЯТР','рЯПµпЄП'] },
  { super: 'building',items:['рЯП†','рЯПҐ','рЯПЂ','рЯП•','рЯП™','рЯП∞','рЯПѓ','рЯЧЉ','рЯЧљ','вЫ™'] },
  { super: 'tech',   items: ['рЯУ±','рЯУЮ','рЯУЇ','рЯУї','рЯТї','вМ®пЄП','рЯЦ•пЄП','рЯЦ®пЄП','рЯУЈ'] },
  { super: 'school', items: ['вЬПпЄП','рЯЦКпЄП','рЯЦЛпЄП','рЯЦНпЄП','рЯУЭ','рЯУЦ','рЯУЪ','рЯУХ','рЯУЧ','рЯУШ'] },
];

const SUCCESSES_TO_ADVANCE = 3;
const MISSES_TO_DESCEND = 5;
const RESULT_MS = 1100;
const INACTIVITY_MS = 120000;
const AUTO_END_MS = 10000;

const boardEl = document.getElementById('board');
const boardWrap = document.getElementById('board-wrap');
const numCardsEl = document.getElementById('num-cards');
const progressEl = document.getElementById('progress');
const statusEl = document.getElementById('status');
const btnReset = document.getElementById('btn-reset');
const btnPrev = document.getElementById('btn-prev');
const overlay = document.getElementById('overlay');
const modalBtn = document.getElementById('modal-btn');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');
const modalEmoji = document.getElementById('modal-emoji');

let levelIdx = 0;
let successCount = 0;
let missStreak = 0;
let state = 'idle';
let cards = [];
let outlierIdx = -1;
let lastOutlierIdx = -1;
let inactivityTimer = null;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Audio ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { audioCtx = new AC(); try { const _o=audioCtx.createOscillator(); const _g=audioCtx.createGain(); _g.gain.value=0; _o.connect(_g).connect(audioCtx.destination); _o.start(); _o.stop(audioCtx.currentTime+0.002); } catch(_){} }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone({ freq = 800, type = 'sine', duration = 0.1, volume = 0.15, startOffset = 0, freqEnd = null }) {
  const ac = getAudio();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  const t0 = ac.currentTime + startOffset;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== null) osc.frequency.linearRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}
function playSuccess() {
  tone({ freq: 523.25, type: 'sine', duration: 0.13, volume: 0.16 });
  tone({ freq: 659.25, type: 'sine', duration: 0.14, volume: 0.16, startOffset: 0.1 });
}
function playError() { tone({ freq: 260, freqEnd: 150, type: 'sawtooth', duration: 0.3, volume: 0.13 }); }
function playLevelUp() {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
    tone({ freq: f, type: 'sine', duration: 0.18, volume: 0.18, startOffset: i * 0.1 });
  });
}

// --- Layout ---
function layoutBoard() {
  const { cols, rows } = LEVELS[levelIdx];
  const w = boardWrap.clientWidth;
  const h = boardWrap.clientHeight;
  if (w === 0 || h === 0) return;
  const gap = 14;
  const availW = w - gap * (cols - 1);
  const availH = h - gap * (rows - 1);
  const cardSize = Math.floor(Math.min(availW / cols, availH / rows));
  const boardW = cols * cardSize + gap * (cols - 1);
  const boardH = rows * cardSize + gap * (rows - 1);
  boardEl.style.width = boardW + 'px';
  boardEl.style.height = boardH + 'px';
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  boardEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  boardEl.style.setProperty('--gap', gap + 'px');
  boardEl.style.setProperty('--emoji-size', Math.floor(cardSize * 0.58) + 'px');
}

// --- Rendering ---
function renderCards(items) {
  const { cards: n, cols, rows } = LEVELS[levelIdx];
  const total = cols * rows;
  boardEl.innerHTML = '';
  cards = [];
  for (let i = 0; i < total; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    if (i >= n) {
      card.classList.add('empty');
      boardEl.appendChild(card);
      cards.push(card);
      continue;
    }
    card.textContent = items[i];
    card.addEventListener('click', () => onCardClick(i));
    boardEl.appendChild(card);
    cards.push(card);
  }
}

// --- Round flow ---
function pickCategory(minItems, excludeSuper = null) {
  const available = CATEGORIES.filter(c =>
    c.items.length >= minItems &&
    (!excludeSuper || c.super !== excludeSuper)
  );
  return pick(available);
}

function startRound() {
  const { cards: n } = LEVELS[levelIdx];
  updateInfo();
  btnPrev.classList.toggle('hidden', levelIdx === 0);

  const inGroup = pickCategory(n - 1);
  const inGroupItems = shuffle([...inGroup.items]).slice(0, n - 1);

  const outlierCat = pickCategory(1, inGroup.super);
  let outlierItem;
  let tries = 0;
  do {
    outlierItem = pick(outlierCat.items);
    tries++;
  } while (inGroupItems.includes(outlierItem) && tries < 20);

  let allItems = shuffle([...inGroupItems, outlierItem]);
  let newOutlierIdx = allItems.indexOf(outlierItem);
  // Ensure outlier's position differs from the previous round's outlier position
  if (newOutlierIdx === lastOutlierIdx && allItems.length > 1) {
    let swapIdx;
    do {
      swapIdx = Math.floor(Math.random() * allItems.length);
    } while (swapIdx === newOutlierIdx);
    [allItems[newOutlierIdx], allItems[swapIdx]] = [allItems[swapIdx], allItems[newOutlierIdx]];
    newOutlierIdx = swapIdx;
  }
  outlierIdx = newOutlierIdx;
  lastOutlierIdx = outlierIdx;

  layoutBoard();
  renderCards(allItems);
  statusEl.textContent = '„Ю„Щ „Ь„Р „©„Щ„Щ„Ъ?';
  state = 'guessing';
  resetInactivity();
}

// --- Inactivity ---
function resetInactivity() {
  clearTimeout(inactivityTimer);
  if (state === 'guessing' || state === 'result') {
    inactivityTimer = setTimeout(showInactivityDialog, INACTIVITY_MS);
  }
}
function showInactivityDialog() {
  if (state === 'paused' || state === 'ended') return;
  const prev = state;
  state = 'paused';
  const o = document.createElement('div');
  o.className = 'end-overlay';
  o.innerHTML = '<div class="end-modal"><h2>„Ь„Ф„Ю„©„Щ„Ъ „Ь„©„Ч„І?</h2><p>2 „У„І„Х„™ „Ь„Ь„Р „§„Ґ„Щ„Ь„Х„™</p><div class="ebtns"><button class="yes">„Ы„Я, „Ь„Ф„Ю„©„Щ„Ъ</button><button class="no">„Ь„Р, „Ь„°„Щ„Щ„Э</button></div></div>';
  let to;
  const cleanup = (choice) => {
    if (to) { clearTimeout(to); to = null; }
    if (o.parentNode) o.remove();
    if (choice === 'yes') { state = prev; resetInactivity(); }
    else endGame();
  };
  o.querySelector('.yes').addEventListener('click', () => cleanup('yes'));
  o.querySelector('.no').addEventListener('click', () => cleanup('no'));
  to = setTimeout(() => cleanup('no'), AUTO_END_MS);
  document.body.appendChild(o);
}

function onCardClick(idx) {
  if (state !== 'guessing') return;
  getAudio();
  if (cards[idx].classList.contains('empty')) return;
  resetInactivity();
  state = 'result';

  if (idx === outlierIdx) {
    cards[idx].classList.add('correct');
    playSuccess();
    successCount++;
    missStreak = 0;
    updateInfo();
    const isLast = levelIdx === LEVELS.length - 1;
    if (!isLast && successCount >= SUCCESSES_TO_ADVANCE) {
      setTimeout(advanceLevel, RESULT_MS);
    } else {
      statusEl.textContent = '„†„Ы„Х„Я!';
      setTimeout(() => {
        cards[idx].classList.remove('correct');
        startRound();
      }, RESULT_MS);
    }
  } else {
    cards[idx].classList.add('wrong');
    cards[outlierIdx].classList.add('correct');
    playError();
    missStreak++;
    statusEl.textContent = '„Ь„Р „†„Ы„Х„Я, „Ю„†„°„Щ„Э „©„Х„С';
    setTimeout(() => {
      cards[idx].classList.remove('wrong');
      cards[outlierIdx].classList.remove('correct');
      // Silent level-down after consecutive misses
      if (missStreak >= MISSES_TO_DESCEND && levelIdx > 0) {
        levelIdx--;
        successCount = 0;
        missStreak = 0;
        lastOutlierIdx = -1;
      }
      startRound();
    }, RESULT_MS + 400);
  }
}

function advanceLevel() {
  const isLast = levelIdx === LEVELS.length - 1;
  if (isLast) {
    // Already at the top level вАФ stay, reset the streak counter, and keep going
    successCount = 0;
    updateInfo();
    playLevelUp();
    statusEl.textContent = '„Ю„¶„Х„Щ„Я! „Ю„Ю„©„Щ„Ы„Щ„Э „С„®„Ю„Ф „Ф„Ц„Х';
    setTimeout(startRound, 800);
    return;
  }
  // Silent advance вАФ sound only, no modal
  levelIdx++;
  successCount = 0;
  lastOutlierIdx = -1;
  playLevelUp();
  startRound();
}

function updateInfo() {
  numCardsEl.textContent = LEVELS[levelIdx].cards;
  const isLast = levelIdx === LEVELS.length - 1;
  progressEl.textContent = isLast ? `${successCount}` : `${successCount}/${SUCCESSES_TO_ADVANCE}`;
  btnPrev.classList.toggle('hidden', levelIdx === 0);
}

modalBtn.addEventListener('click', () => {
  const action = modalBtn.dataset.action;
  overlay.classList.remove('show');
  if (action === 'next') {
    levelIdx = Math.min(levelIdx + 1, LEVELS.length - 1);
    successCount = 0;
  } else {
    levelIdx = 0;
    successCount = 0;
  }
  startRound();
});

btnReset.addEventListener('click', () => {
  getAudio();
  overlay.classList.remove('show');
  levelIdx = 0;
  successCount = 0;
  missStreak = 0;
  lastOutlierIdx = -1;
  startRound();
});

btnPrev.addEventListener('click', () => {
  getAudio();
  if (levelIdx === 0) return;
  overlay.classList.remove('show');
  levelIdx--;
  successCount = 0;
  missStreak = 0;
  lastOutlierIdx = -1;
  startRound();
});

window.addEventListener('resize', layoutBoard);

startRound();

function confirmEndGame() {
  clearTimeout(inactivityTimer);
  const prev = state;
  state = 'paused';
  const overlay = document.createElement('div');
  overlay.className = 'end-overlay';
  overlay.innerHTML = '<div class="end-modal"><h2>„Ь„°„Щ„Щ„Э „Р„™ „Ф„Ю„©„Ч„І?</h2><div class="ebtns"><button class="yes">„Ы„Я</button><button class="no">„Ь„Р</button></div></div>';
  overlay.querySelector('.yes').addEventListener('click', () => { overlay.remove(); endGame(); });
  overlay.querySelector('.no').addEventListener('click', () => {
    overlay.remove();
    state = prev;
    resetInactivity();
  });
  document.body.appendChild(overlay);
}
function endGame() {
  clearTimeout(inactivityTimer);
  state = 'ended';
  document.body.innerHTML = '<div class="goodbye"><div class="wave">рЯСЛ</div><div class="text">„Ь„Ф„™„®„Р„Х„™!</div></div>';
  setTimeout(() => { location.href = 'index.html'; }, 1500);
}
document.getElementById('btn-end').addEventListener('click', confirmEndGame);
</script>
</body>

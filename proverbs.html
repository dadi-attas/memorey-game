<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>פתגם חלקי</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff; user-select: none; touch-action: manipulation;
  }
  #app { height: 100vh; width: 100vw; display: flex; flex-direction: column; padding: 12px; gap: 8px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex: 0 0 auto; height: 56px; }
  .btn {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.35);
    color: #fff; padding: 11px 20px;
    font-size: 17px; font-weight: 700;
    border-radius: 12px; cursor: pointer;
    transition: transform 0.08s, background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.3); }
  .btn:active { transform: scale(0.94); }
  .info {
    flex: 1 1 auto; display: flex; justify-content: center; align-items: center;
    gap: 28px; font-size: 20px; font-weight: 600;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
  }
  .info span b { color: #ffd86b; font-size: 26px; margin-inline-start: 6px; }

  #status {
    text-align: center;
    font-size: 22px; font-weight: 700;
    flex: 0 0 auto;
    min-height: 30px;
    color: #ffd86b;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    letter-spacing: 1px;
  }

  #proverb-wrap {
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 0;
    padding: 10px;
  }
  #proverb-box {
    background: radial-gradient(ellipse at center, #fffdf7 0%, #f4e9cf 75%, #e8d9a8 100%);
    border-radius: 26px;
    box-shadow: inset 0 4px 18px rgba(0,0,0,0.22), 0 10px 28px rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.5);
    padding: 30px 34px;
    max-width: 92%;
    width: auto;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #proverb {
    font-size: clamp(28px, 4.5vw, 54px);
    color: #222;
    text-align: center;
    line-height: 1.6;
    font-weight: 700;
    font-family: "David", "Frank Ruehl", "Tahoma", serif;
    direction: rtl;
  }

  .blank {
    display: inline-block;
    min-width: 2.6em;
    padding: 0.04em 0.5em;
    margin: 0 0.15em;
    background: rgba(0,0,0,0.18);
    border: 3px dashed #c97a00;
    color: #c97a00;
    border-radius: 10px;
    font-weight: 900;
    font-size: 0.95em;
    animation: missPulse 1.4s ease-in-out infinite;
    vertical-align: baseline;
    line-height: 1.25;
  }
  .blank.filled {
    background: #a8e6a1;
    border-style: solid;
    border-color: #3fa83f;
    color: #14532d;
    animation: fillIn 0.6s ease;
  }
  @keyframes missPulse {
    0%, 100% { box-shadow: 0 0 0 rgba(201,122,0,0); }
    50%      { box-shadow: 0 0 18px rgba(201,122,0,0.65); }
  }
  @keyframes fillIn {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  #choices {
    flex: 0 0 auto;
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
    padding: 8px;
    min-height: 110px;
  }
  .choice {
    min-width: 160px;
    min-height: 86px;
    background: #fff;
    color: #222;
    border: 4px solid rgba(255,255,255,0.7);
    border-radius: 20px;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 800;
    cursor: pointer;
    padding: 14px 28px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.15s, background 0.2s, border-color 0.15s;
    font-family: inherit;
  }
  .choice:hover { transform: scale(1.05); box-shadow: 0 10px 24px rgba(0,0,0,0.5); }
  .choice:active { transform: scale(0.96); }
  .choice.correct {
    background: #a8e6a1;
    border-color: #3fa83f;
    color: #14532d;
    animation: pulseGreen 0.8s ease;
  }
  .choice.wrong {
    background: #ffb3b3;
    border-color: #e55b5b;
    color: #7a1a1a;
    animation: shake 0.5s ease;
  }
  .choice.locked { pointer-events: none; }
  @keyframes pulseGreen {
    0%, 100% { transform: scale(1); box-shadow: 0 6px 18px rgba(0,0,0,0.4); }
    50%      { transform: scale(1.1);  box-shadow: 0 0 35px rgba(86,195,77,0.95); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-9px); }
    40% { transform: translateX(9px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  #overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 30px 44px; border-radius: 22px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  .modal .emoji { font-size: 64px; margin-bottom: 10px; }
  .modal h2 { font-size: 30px; margin-bottom: 10px; }
  .modal p { font-size: 18px; margin-bottom: 20px; opacity: 0.95; }
  .modal .btn { background: #fff; color: #333; font-size: 18px; padding: 12px 28px; }
  .modal .btn:hover { background: #ffd86b; }

  .btn-end {
    background: linear-gradient(135deg, #ff8a8a 0%, #e55b5b 100%) !important;
    border-color: rgba(255,255,255,0.55) !important;
    color: #fff !important;
  }
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; backdrop-filter: blur(4px);
  }
  .end-modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 28px 38px; border-radius: 20px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: #fff;
  }
  .end-modal h2 { font-size: 28px; margin-bottom: 18px; font-weight: 800; }
  .end-modal p { font-size: 15px; margin-bottom: 14px; opacity: 0.9; }
  .end-modal .ebtns { display: flex; gap: 14px; justify-content: center; }
  .end-modal button {
    padding: 12px 30px; font-size: 18px; font-weight: 800;
    border-radius: 12px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.55);
    font-family: inherit;
  }
  .end-modal button.yes { background: #7dd87d; color: #fff; }
  .end-modal button.no  { background: #fff; color: #333; }
  .goodbye {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff;
    z-index: 99999;
  }
  .goodbye .wave { font-size: 110px; margin-bottom: 12px; }
  .goodbye .text { font-size: 46px; font-weight: 800; }
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="btn-reset" class="btn">איפוס</button>
    <div class="info">
      <span>רמה: <b id="level-num">1</b></span>
      <span><span id="progress-label">נכונים:</span> <b id="progress-num">0/3</b></span>
    </div>
    <button id="btn-end" class="btn btn-end">סיום</button>
  </header>
  <div id="status">השלם את הפתגם</div>
  <div id="proverb-wrap">
    <div id="proverb-box">
      <div id="proverb"></div>
    </div>
  </div>
  <div id="choices"></div>
</div>

<div id="overlay">
  <div class="modal">
    <div class="emoji" id="modal-emoji">🌟</div>
    <h2 id="modal-title">רמה חדשה!</h2>
    <p id="modal-text"></p>
    <button id="modal-btn" class="btn">המשך</button>
  </div>
</div>

<script>
// ★ Proverb data: text with '___' placeholder for the hidden word.
// level 1 = easy/short/well-known; 4 = literary/biblical.
const PROVERBS = [
  { text: 'סייג לחוכמה ___',                              answer: 'שתיקה',   distractors: ['תבונה', 'דעת'],        level: 3 },
  { text: 'במקום שאין אנשים, השתדל להיות ___',          answer: 'איש',     distractors: ['גבר', 'חכם'],           level: 4 },
  { text: 'אל תסתכל בקנקן, אלא במה ש___ בו',            answer: 'יש',      distractors: ['כתוב', 'נראה'],         level: 2 },
  { text: 'דרך ארץ קדמה ל___',                          answer: 'תורה',    distractors: ['דעת', 'חוכמה'],         level: 4 },
  { text: 'כל המוסיף ___',                               answer: 'גורע',    distractors: ['זוכה', 'מרוויח'],       level: 1 },
  { text: 'איזהו גיבור? הכובש את ___',                   answer: 'יצרו',    distractors: ['אויבו', 'כעסו'],        level: 4 },
  { text: 'אין חכם כבעל ___',                            answer: 'הניסיון', distractors: ['הבינה', 'הדעת'],        level: 3 },
  { text: 'כל ההתחלות ___',                              answer: 'קשות',    distractors: ['קלות', 'מהירות'],       level: 1 },
  { text: 'סוף מעשה במחשבה ___',                         answer: 'תחילה',   distractors: ['ראשונה', 'עמוקה'],      level: 2 },
  { text: 'אל תדחה למחר מה שאפשר לעשות ___',             answer: 'היום',    distractors: ['מחר', 'עכשיו'],         level: 1 },
  { text: 'מי שטרח בערב שבת, יאכל ___',                  answer: 'בשבת',    distractors: ['בחג', 'בבוקר'],         level: 2 },
  { text: 'הזמן עושה את ___',                            answer: 'שלו',     distractors: ['הדבר', 'שעתו'],         level: 2 },
  { text: 'אין דבר העומד בפני ___',                      answer: 'הרצון',   distractors: ['הכוח', 'האמת'],         level: 3 },
  { text: 'טוב שכן קרוב מ___ רחוק',                      answer: 'אח',      distractors: ['חבר', 'שכן'],           level: 2 },
  { text: 'אין עשן בלי ___',                             answer: 'אש',      distractors: ['רוח', 'ריח'],           level: 1 },
  { text: 'לא כל הנוצץ ___',                             answer: 'זהב',     distractors: ['כסף', 'יקר'],           level: 1 },
  { text: 'אל תשפוט אדם עד שתגיע ל___',                  answer: 'מקומו',   distractors: ['ביתו', 'גילו'],         level: 3 },
  { text: 'לשקר אין ___',                                answer: 'רגליים',  distractors: ['ידיים', 'כנפיים'],      level: 2 },
  { text: 'איזהו עשיר? ה___ בחלקו',                      answer: 'שמח',     distractors: ['מסתפק', 'אוהב'],        level: 3 },
  { text: 'מרבה נכסים, מרבה ___',                        answer: 'דאגה',    distractors: ['כבוד', 'שמחה'],         level: 3 },
  { text: 'כל הפוסל, במומו ___',                         answer: 'פוסל',    distractors: ['שופט', 'טועה'],         level: 4 },
  { text: 'לא המדרש הוא העיקר, אלא ה___',                answer: 'מעשה',    distractors: ['לימוד', 'דיבור'],       level: 3 },
  { text: 'מצווה גוררת ___',                             answer: 'מצווה',   distractors: ['שכר', 'ברכה'],          level: 2 },
  { text: 'ולפני עיוור, לא תיתן ___',                    answer: 'מכשול',   distractors: ['עצה', 'מתנה'],          level: 4 },
  { text: 'אין חדש תחת ה___',                            answer: 'שמש',     distractors: ['שמים', 'ירח'],          level: 1 },
  { text: 'אם תרצו, אין זו ___',                         answer: 'אגדה',    distractors: ['חלום', 'סיפור'],        level: 3 },
  { text: 'לך אל הנמלה ___',                             answer: 'עצל',     distractors: ['טיפש', 'חבר'],          level: 3 },
  { text: 'חנוך לנער על פי ___',                         answer: 'דרכו',    distractors: ['גילו', 'רצונו'],        level: 4 },
  { text: 'טוב שם משמן ___',                             answer: 'טוב',     distractors: ['זית', 'יקר'],           level: 4 },
  { text: 'דור הולך ודור ___',                           answer: 'בא',      distractors: ['חוזר', 'עולה'],         level: 1 },
  { text: 'אשת חיל מי ___',                              answer: 'ימצא',    distractors: ['יראה', 'ישיג'],         level: 4 },
  { text: 'השקט לפני ה___',                              answer: 'סערה',    distractors: ['קרב', 'גשם'],           level: 1 },
  { text: 'כל ישראל ערבים זה ___',                       answer: 'לזה',     distractors: ['בזה', 'מזה'],           level: 3 },
  { text: 'אם אין קמח, אין ___',                         answer: 'תורה',    distractors: ['חיים', 'בית'],          level: 2 },
  { text: 'תפסת מרובה, לא ___',                          answer: 'תפסת',    distractors: ['הצלחת', 'זכית'],        level: 1 },
  { text: 'אם אין אני לי, מי ___',                       answer: 'לי',      distractors: ['אהיה', 'יעזור'],        level: 4 },
  { text: 'כבד את אביך ואת ___',                         answer: 'אמך',     distractors: ['אחיך', 'משפחתך'],       level: 1 },
  { text: 'מצא אשה, מצא ___',                            answer: 'טוב',     distractors: ['אושר', 'שמחה'],         level: 4 },
  { text: 'ויפה שעה אחת ___',                            answer: 'קודם',    distractors: ['לפני', 'מקודם'],        level: 2 },
  { text: 'הכלבים נובחים, והשיירה ___',                  answer: 'עוברת',   distractors: ['ממשיכה', 'נוסעת'],      level: 2 },
  { text: 'הזורעים בדמעה, ברינה ___',                    answer: 'יקצורו',  distractors: ['ישמחו', 'ינצחו'],       level: 4 },
];

// Level filter: which difficulty levels apply per game level.
const LEVEL_FILTERS = [
  [1],        // level 1 → easy only
  [1, 2],     // level 2 → easy & mid
  [2, 3],     // level 3 → mid-advanced
  [3, 4],     // level 4 → advanced
  [3, 4],     // level 5 (infinite) → advanced only
];

const SUCCESSES_TO_ADVANCE = 3;
const MISSES_TO_DESCEND = 5;
const INACTIVITY_MS = 120000;
const AUTO_END_MS = 10000;
const CORRECT_DELAY_MS = 1600;
const WRONG_RESET_MS = 700;

const proverbEl = document.getElementById('proverb');
const choicesEl = document.getElementById('choices');
const statusEl = document.getElementById('status');
const levelNumEl = document.getElementById('level-num');
const progressLabelEl = document.getElementById('progress-label');
const progressNumEl = document.getElementById('progress-num');
const btnReset = document.getElementById('btn-reset');
const btnEnd = document.getElementById('btn-end');
const overlay = document.getElementById('overlay');
const modalEmoji = document.getElementById('modal-emoji');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');
const modalBtn = document.getElementById('modal-btn');

let levelIdx = 0;
let successCount = 0;
let missStreak = 0;
let lastLevelScore = 0;
let state = 'playing';
let currentProverb = null;
let recentIds = [];  // avoid repeating recent proverbs
const MAX_LEVELS = 5;
let inactivityTimer = null;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Audio ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { audioCtx = new AC(); try { const _o=audioCtx.createOscillator(); const _g=audioCtx.createGain(); _g.gain.value=0; _o.connect(_g).connect(audioCtx.destination); _o.start(); _o.stop(audioCtx.currentTime+0.002); } catch(_){} }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone({ freq = 800, type = 'sine', duration = 0.1, volume = 0.15, startOffset = 0, freqEnd = null }) {
  const ac = getAudio();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  const t0 = ac.currentTime + startOffset;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== null) osc.frequency.linearRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}
function playSuccess() {
  tone({ freq: 523.25, type: 'sine', duration: 0.13, volume: 0.16 });
  tone({ freq: 659.25, type: 'sine', duration: 0.14, volume: 0.16, startOffset: 0.1 });
}
function playError() { tone({ freq: 260, freqEnd: 150, type: 'sawtooth', duration: 0.3, volume: 0.13 }); }
function playLevelUp() {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
    tone({ freq: f, type: 'sine', duration: 0.18, volume: 0.18, startOffset: i * 0.1 });
  });
}

function pickProverb() {
  const allowedLevels = LEVEL_FILTERS[levelIdx];
  let pool = PROVERBS
    .map((p, i) => ({ p, i }))
    .filter(x => allowedLevels.includes(x.p.level))
    .filter(x => !recentIds.includes(x.i));
  if (pool.length === 0) {
    // Reset recent window if we exhausted the pool
    recentIds = [];
    pool = PROVERBS.map((p, i) => ({ p, i })).filter(x => allowedLevels.includes(x.p.level));
  }
  const chosen = pick(pool);
  recentIds.push(chosen.i);
  if (recentIds.length > 12) recentIds.shift();
  return chosen.p;
}

function renderProverb(proverb) {
  // Split text at '___' placeholder and render with a styled blank in between.
  const parts = proverb.text.split('___');
  proverbEl.innerHTML = '';
  const beforeSpan = document.createElement('span');
  beforeSpan.textContent = parts[0];
  const blankSpan = document.createElement('span');
  blankSpan.className = 'blank';
  blankSpan.textContent = '?';
  blankSpan.id = 'blank';
  const afterSpan = document.createElement('span');
  afterSpan.textContent = parts[1] || '';
  proverbEl.appendChild(beforeSpan);
  proverbEl.appendChild(blankSpan);
  proverbEl.appendChild(afterSpan);
}

function renderChoices(proverb) {
  const options = shuffle([proverb.answer, ...proverb.distractors]);
  choicesEl.innerHTML = '';
  options.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = word;
    btn.addEventListener('click', () => onChoice(word, btn));
    choicesEl.appendChild(btn);
  });
}

function startRound() {
  currentProverb = pickProverb();
  renderProverb(currentProverb);
  renderChoices(currentProverb);
  state = 'playing';
  statusEl.textContent = 'השלם את הפתגם';
  updateInfo();
  resetInactivity();
}

function onChoice(word, btnEl) {
  if (state !== 'playing') return;
  getAudio();
  resetInactivity();

  if (word === currentProverb.answer) {
    state = 'result';
    document.querySelectorAll('.choice').forEach(el => el.classList.add('locked'));
    btnEl.classList.add('correct');
    playSuccess();

    const blank = document.getElementById('blank');
    if (blank) {
      blank.textContent = currentProverb.answer;
      blank.classList.add('filled');
    }
    statusEl.textContent = 'נכון!';

    const isLast = levelIdx === MAX_LEVELS - 1;
    if (isLast) lastLevelScore++;
    else successCount++;
    missStreak = 0;
    updateInfo();

    setTimeout(() => {
      if (!isLast && successCount >= SUCCESSES_TO_ADVANCE) {
        showLevelUp();
      } else {
        startRound();
      }
    }, CORRECT_DELAY_MS);
  } else {
    btnEl.classList.add('wrong');
    playError();
    missStreak++;

    setTimeout(() => {
      btnEl.classList.remove('wrong');
      if (missStreak >= MISSES_TO_DESCEND && levelIdx > 0) {
        levelIdx--;
        successCount = 0;
        missStreak = 0;
        startRound();
      }
    }, WRONG_RESET_MS);
  }
}

function showLevelUp() {
  // Silent advance — sound only, no modal
  levelIdx++;
  successCount = 0;
  missStreak = 0;
  playLevelUp();
  startRound();
}

function updateInfo() {
  levelNumEl.textContent = levelIdx + 1;
  const isLast = levelIdx === MAX_LEVELS - 1;
  if (isLast) {
    progressLabelEl.textContent = 'ניקוד:';
    progressNumEl.textContent = lastLevelScore;
  } else {
    progressLabelEl.textContent = 'נכונים:';
    progressNumEl.textContent = `${successCount}/${SUCCESSES_TO_ADVANCE}`;
  }
}

// --- Inactivity ---
function resetInactivity() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(showInactivityDialog, INACTIVITY_MS);
}
function showInactivityDialog() {
  if (state !== 'playing') return;
  state = 'paused';
  const o = document.createElement('div');
  o.className = 'end-overlay';
  o.innerHTML = '<div class="end-modal"><h2>להמשיך לשחק?</h2><p>2 דקות ללא פעילות</p><div class="ebtns"><button class="yes">כן, להמשיך</button><button class="no">לא, לסיים</button></div></div>';
  let to;
  const cleanup = (choice) => {
    if (to) { clearTimeout(to); to = null; }
    if (o.parentNode) o.remove();
    if (choice === 'yes') { state = 'playing'; resetInactivity(); }
    else endGame();
  };
  o.querySelector('.yes').addEventListener('click', () => cleanup('yes'));
  o.querySelector('.no').addEventListener('click', () => cleanup('no'));
  to = setTimeout(() => cleanup('no'), AUTO_END_MS);
  document.body.appendChild(o);
}

// --- Reset / End ---
btnReset.addEventListener('click', () => {
  getAudio();
  overlay.classList.remove('show');
  levelIdx = 0;
  successCount = 0;
  missStreak = 0;
  lastLevelScore = 0;
  recentIds = [];
  startRound();
});

function confirmEndGame() {
  clearTimeout(inactivityTimer);
  const prev = state;
  state = 'paused';
  const o = document.createElement('div');
  o.className = 'end-overlay';
  o.innerHTML = '<div class="end-modal"><h2>לסיים את המשחק?</h2><div class="ebtns"><button class="yes">כן</button><button class="no">לא</button></div></div>';
  o.querySelector('.yes').addEventListener('click', () => { o.remove(); endGame(); });
  o.querySelector('.no').addEventListener('click', () => {
    o.remove();
    state = prev;
    resetInactivity();
  });
  document.body.appendChild(o);
}
function endGame() {
  clearTimeout(inactivityTimer);
  document.body.innerHTML = '<div class="goodbye"><div class="wave">👋</div><div class="text">להתראות!</div></div>';
  setTimeout(() => { location.href = 'index.html'; }, 1500);
}
btnEnd.addEventListener('click', confirmEndGame);

startRound();
</script>
</body>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>מה מתאים למה?</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff; user-select: none; touch-action: manipulation;
  }
  #app { height: 100vh; width: 100vw; display: flex; flex-direction: column; padding: 10px; gap: 6px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex: 0 0 auto; height: 54px; }
  .btn {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.35);
    color: #fff; padding: 10px 18px;
    font-size: 16px; font-weight: 700;
    border-radius: 12px; cursor: pointer;
    transition: transform 0.08s, background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.3); }
  .btn:active { transform: scale(0.94); }
  .info {
    flex: 1 1 auto; display: flex; justify-content: center; align-items: center;
    gap: 24px; font-size: 18px; font-weight: 600;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
  }
  .info span b { color: #ffd86b; font-size: 22px; margin-inline-start: 6px; }

  #theme-header {
    flex: 0 0 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 10px 18px;
    background: radial-gradient(ellipse at center, #fffdf7 0%, #f4e9cf 75%, #e8d9a8 100%);
    border-radius: 22px;
    border: 3px solid rgba(255,255,255,0.5);
    box-shadow: inset 0 4px 14px rgba(0,0,0,0.18), 0 6px 18px rgba(0,0,0,0.35);
    margin: 2px 4px;
  }
  #theme-header.enter { animation: themeEnter 0.45s ease; }
  @keyframes themeEnter {
    0%   { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #theme-icon { font-size: clamp(48px, 6vw, 76px); line-height: 1; }
  #theme-name { font-size: clamp(26px, 3.2vw, 44px); font-weight: 900; color: #333; }

  #sub-status {
    flex: 0 0 auto;
    text-align: center;
    font-size: 19px; font-weight: 700;
    min-height: 26px;
    color: #ffd86b;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    letter-spacing: 1px;
  }

  #board-wrap {
    flex: 1 1 auto;
    display: flex; align-items: center; justify-content: center;
    min-height: 0; min-width: 0;
    padding: 4px;
  }
  #board {
    display: grid;
    gap: var(--gap, 12px);
  }
  .card {
    background: #fff;
    color: #222;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 5px 14px rgba(0, 0, 0, 0.35);
    border: 3px solid rgba(255, 255, 255, 0.5);
    transition: transform 0.1s, box-shadow 0.15s, background 0.2s, border-color 0.15s;
    font-size: var(--emoji-size, 56px);
    line-height: 1;
  }
  .card:hover { transform: scale(1.04); box-shadow: 0 10px 22px rgba(0, 0, 0, 0.45); }
  .card:active { transform: scale(0.96); }
  .card.matched {
    animation: matchFade 0.7s ease forwards;
    pointer-events: none;
  }
  @keyframes matchFade {
    0%   { transform: scale(1);    background: #fff; }
    30%  { transform: scale(1.15); background: #a8e6a1; border-color: #3fa83f; box-shadow: 0 0 30px rgba(86,195,77,0.9); }
    70%  { transform: scale(1);    background: #a8e6a1; border-color: #3fa83f; opacity: 1; }
    100% { transform: scale(0.7);  background: #a8e6a1; border-color: #3fa83f; opacity: 0; }
  }
  .card.wrong {
    background: #ffb3b3;
    border-color: #e55b5b;
    color: #7a1a1a;
    animation: shake 0.5s ease;
  }
  .card.hidden { visibility: hidden; pointer-events: none; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  #overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  #overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 30px 44px; border-radius: 22px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  .modal .emoji { font-size: 64px; margin-bottom: 10px; }
  .modal h2 { font-size: 30px; margin-bottom: 10px; }
  .modal p { font-size: 18px; margin-bottom: 20px; opacity: 0.95; }
  .modal .btn { background: #fff; color: #333; font-size: 18px; padding: 12px 28px; }
  .modal .btn:hover { background: #ffd86b; }

  .btn-end {
    background: linear-gradient(135deg, #ff8a8a 0%, #e55b5b 100%) !important;
    border-color: rgba(255,255,255,0.55) !important;
    color: #fff !important;
  }
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; backdrop-filter: blur(4px);
  }
  .end-modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 28px 38px; border-radius: 20px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: #fff;
  }
  .end-modal h2 { font-size: 28px; margin-bottom: 18px; font-weight: 800; }
  .end-modal p { font-size: 15px; margin-bottom: 14px; opacity: 0.9; }
  .end-modal .ebtns { display: flex; gap: 14px; justify-content: center; }
  .end-modal button {
    padding: 12px 30px; font-size: 18px; font-weight: 800;
    border-radius: 12px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.55);
    font-family: inherit;
  }
  .end-modal button.yes { background: #7dd87d; color: #fff; }
  .end-modal button.no  { background: #fff; color: #333; }
  .goodbye {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff;
    z-index: 99999;
  }
  .goodbye .wave { font-size: 110px; margin-bottom: 12px; }
  .goodbye .text { font-size: 46px; font-weight: 800; }
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="btn-reset" class="btn">איפוס</button>
    <div class="info">
      <span>רמה: <b id="level-num">1</b></span>
      <span><span id="progress-label">נכונים:</span> <b id="progress-num">0/3</b></span>
    </div>
    <button id="btn-end" class="btn btn-end">סיום</button>
  </header>
  <div id="theme-header">
    <div id="theme-icon">🏖️</div>
    <div id="theme-name">חוף ים</div>
  </div>
  <div id="sub-status">מצאת 0 מתוך 3</div>
  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<div id="overlay">
  <div class="modal">
    <div class="emoji" id="modal-emoji">🌟</div>
    <h2 id="modal-title">רמה חדשה!</h2>
    <p id="modal-text"></p>
    <button id="modal-btn" class="btn">המשך</button>
  </div>
</div>

<script>
// --- Levels: total cards in the grid, how many of them match the theme ---
const LEVELS = [
  { totalCards: 6,  matchesCount: 3, cols: 3, rows: 2, successesToAdvance: 3 },
  { totalCards: 8,  matchesCount: 4, cols: 4, rows: 2, successesToAdvance: 3 },
  { totalCards: 10, matchesCount: 4, cols: 5, rows: 2, successesToAdvance: 3 },
  { totalCards: 12, matchesCount: 5, cols: 4, rows: 3, successesToAdvance: 3 },
  { totalCards: 12, matchesCount: 4, cols: 4, rows: 3, successesToAdvance: Infinity },
];

// --- 15 themes. Each theme's `matches` is the definitive list of items that
// belong to it. Distractors are drawn from DISTRACTOR_POOL minus these.
const THEMES = [
  { name: 'חוף ים',        icon: '🏖️', matches: ['🩴','🏐','🕶️','🧴','🏄','🐚','🦀','🌊','⛱️','🏖️','🌴','🩱'] },
  { name: 'מטבח',          icon: '🍳', matches: ['🍳','🥄','🍴','🍽️','🧂','🔪','🫖','🥣','🍲'] },
  { name: 'בית חולים',     icon: '🏥', matches: ['💊','💉','🩺','🩹','🚑','🏥','🌡️'] },
  { name: 'בית ספר',       icon: '🏫', matches: ['✏️','📖','📚','🎒','📝','✂️','🖊️','🏫','📏'] },
  { name: 'יום גשם',       icon: '🌧️', matches: ['☂️','🧥','🥾','🌧️','⛈️','☔','💧'] },
  { name: 'יום הולדת',     icon: '🎂', matches: ['🎂','🎈','🎁','🎉','🍰','🎊','🧁','🕯️'] },
  { name: 'אמנות וציור',   icon: '🎨', matches: ['🎨','🖼️','🖌️','🖍️'] },
  { name: 'נסיעה לחו״ל',   icon: '✈️', matches: ['🧳','✈️','🎫','🗺️','🛩️','🏨'] },
  { name: 'סופרמרקט',      icon: '🛒', matches: ['🛒','🛍️','💰','💳','🧺','🏷️'] },
  { name: 'סלון בבית',     icon: '🛋️', matches: ['🛋️','📺','💡','🪑','🕰️','🖼️'] },
  { name: 'כלב ביתי',      icon: '🐶', matches: ['🐶','🦴','🐾','🦮','🐕'] },
  { name: 'חדר ילדים',     icon: '🧸', matches: ['🧸','🪀','🎈','🪁','🎮'] },
  { name: 'חתונה',         icon: '💒', matches: ['💒','💍','👰','🤵','💐'] },
  { name: 'חורף קר',       icon: '❄️', matches: ['❄️','⛄','🧤','🧣','🎿','⛷️','🏂'] },
  { name: 'גינה פורחת',    icon: '🌷', matches: ['🌱','🌿','🌻','🌷','🌹','🪴','🌼','🌺','🍃','💐'] },
];

// Neutral distractor pool (items we can safely drop into any theme as "not matching")
const DISTRACTOR_POOL = [
  // Musical
  '🎸','🎹','🎺','🎻','🥁','🎷',
  // Vehicles
  '🚗','🚕','🚌','🚒','🚜','🏍️','🚲','🚂',
  // Wild animals (not dog, not beach)
  '🐱','🐰','🦁','🐘','🐵','🐴','🐮','🐷','🐻','🐯','🦊','🐨','🦓','🐪',
  // Fruits / vegetables
  '🍎','🍌','🍇','🍋','🍊','🍓','🍉','🥭','🍑','🍒','🍍',
  '🥕','🌽','🥒','🍆','🥦','🧅',
  // Tech
  '📱','💻','📷',
  // Sports (not in any theme)
  '⚽','🏀','🏈','🎾','⚾',
  // Tools
  '🔨','🔧','🪛','🪓',
  // Games
  '🎲','🎯',
  // Weather (non-rainy)
  '☀️','🌙','⭐','🌈',
];

const SUCCESSES_TO_ADVANCE = 3;
const MISSES_TO_DESCEND = 5;
const INACTIVITY_MS = 12000;
const AUTO_END_MS = 10000;
const ROUND_END_DELAY_MS = 900;

const themeHeaderEl = document.getElementById('theme-header');
const themeIconEl = document.getElementById('theme-icon');
const themeNameEl = document.getElementById('theme-name');
const subStatusEl = document.getElementById('sub-status');
const boardEl = document.getElementById('board');
const boardWrapEl = document.getElementById('board-wrap');
const levelNumEl = document.getElementById('level-num');
const progressLabelEl = document.getElementById('progress-label');
const progressNumEl = document.getElementById('progress-num');
const btnReset = document.getElementById('btn-reset');
const btnEnd = document.getElementById('btn-end');
const overlay = document.getElementById('overlay');
const modalEmoji = document.getElementById('modal-emoji');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');
const modalBtn = document.getElementById('modal-btn');

let levelIdx = 0;
let successCount = 0;
let missStreak = 0;
let lastLevelScore = 0;
let state = 'playing';
let currentTheme = null;
let currentMatches = new Set();
let totalMatchesInRound = 0;
let foundCount = 0;
let wrongAttempts = 0;
let descendQueued = false;
let recentThemes = [];
let inactivityTimer = null;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Audio ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { audioCtx = new AC(); try { const _o=audioCtx.createOscillator(); const _g=audioCtx.createGain(); _g.gain.value=0; _o.connect(_g).connect(audioCtx.destination); _o.start(); _o.stop(audioCtx.currentTime+0.002); } catch(_){} }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone({ freq = 800, type = 'sine', duration = 0.1, volume = 0.15, startOffset = 0, freqEnd = null }) {
  const ac = getAudio();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  const t0 = ac.currentTime + startOffset;
  osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd !== null) osc.frequency.linearRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}
function playSuccess() {
  tone({ freq: 523.25, type: 'sine', duration: 0.12, volume: 0.16 });
  tone({ freq: 659.25, type: 'sine', duration: 0.13, volume: 0.16, startOffset: 0.08 });
}
function playCompleteRound() {
  [523.25, 659.25, 783.99].forEach((f, i) => {
    tone({ freq: f, type: 'sine', duration: 0.15, volume: 0.18, startOffset: i * 0.1 });
  });
}
function playError() { tone({ freq: 260, freqEnd: 150, type: 'sawtooth', duration: 0.3, volume: 0.13 }); }
function playLevelUp() {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
    tone({ freq: f, type: 'sine', duration: 0.18, volume: 0.18, startOffset: i * 0.1 });
  });
}

// --- Layout ---
function layoutBoard() {
  const { cols, rows, totalCards } = LEVELS[levelIdx];
  const w = boardWrapEl.clientWidth;
  const h = boardWrapEl.clientHeight;
  if (w === 0 || h === 0) return;
  const gap = 12;
  const availW = w - gap * (cols - 1);
  const availH = h - gap * (rows - 1);
  const cardSize = Math.max(60, Math.floor(Math.min(availW / cols, availH / rows)));
  boardEl.style.width = (cardSize * cols + gap * (cols - 1)) + 'px';
  boardEl.style.height = (cardSize * rows + gap * (rows - 1)) + 'px';
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  boardEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  boardEl.style.setProperty('--gap', gap + 'px');
  boardEl.style.setProperty('--emoji-size', Math.floor(cardSize * 0.55) + 'px');
}

// --- Round ---
function pickTheme() {
  const available = THEMES.filter(t => !recentThemes.includes(t.name));
  const pool = available.length > 0 ? available : THEMES;
  const chosen = pick(pool);
  recentThemes.push(chosen.name);
  if (recentThemes.length > 5) recentThemes.shift();
  return chosen;
}

function startRound() {
  const lvl = LEVELS[levelIdx];
  currentTheme = pickTheme();

  // Pick matches
  const matchPool = shuffle([...currentTheme.matches]);
  const actualMatches = matchPool.slice(0, Math.min(lvl.matchesCount, matchPool.length));
  currentMatches = new Set(actualMatches);
  totalMatchesInRound = actualMatches.length;

  // Pick distractors from DISTRACTOR_POOL minus theme matches
  const distractorCount = lvl.totalCards - actualMatches.length;
  const availableDistractors = DISTRACTOR_POOL.filter(e => !currentMatches.has(e));
  const distractors = shuffle(availableDistractors).slice(0, distractorCount);

  // Build cards, shuffled
  const allCards = shuffle([...actualMatches, ...distractors]);

  // Render theme header
  themeIconEl.textContent = currentTheme.icon;
  themeNameEl.textContent = currentTheme.name;
  themeHeaderEl.classList.remove('enter');
  void themeHeaderEl.offsetWidth;
  themeHeaderEl.classList.add('enter');

  // Render cards
  boardEl.innerHTML = '';
  allCards.forEach(emoji => {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = emoji;
    card.dataset.emoji = emoji;
    card.addEventListener('click', () => onCardClick(card, emoji));
    boardEl.appendChild(card);
  });

  foundCount = 0;
  wrongAttempts = 0;
  state = 'playing';
  updateSubStatus();
  updateInfo();
  resetInactivity();
  requestAnimationFrame(layoutBoard);
}

function onCardClick(cardEl, emoji) {
  if (state !== 'playing') return;
  if (cardEl.classList.contains('matched') || cardEl.classList.contains('hidden')) return;
  getAudio();
  resetInactivity();

  if (currentMatches.has(emoji)) {
    // Correct match
    cardEl.classList.add('matched');
    playSuccess();
    foundCount++;
    updateSubStatus();

    setTimeout(() => {
      cardEl.classList.add('hidden');
    }, 700);

    if (foundCount >= totalMatchesInRound) {
      state = 'result';
      setTimeout(onRoundComplete, 800);
    }
  } else {
    // Wrong
    cardEl.classList.add('wrong');
    playError();
    if (wrongAttempts === 0) {
      missStreak++;
      successCount = 0;
      if (missStreak >= MISSES_TO_DESCEND && levelIdx > 0) {
        descendQueued = true;
        missStreak = 0;
      }
    }
    wrongAttempts++;
    setTimeout(() => cardEl.classList.remove('wrong'), 550);
  }
}

function onRoundComplete() {
  playCompleteRound();
  const isLast = levelIdx === LEVELS.length - 1;
  if (wrongAttempts === 0) {
    successCount++;
    missStreak = 0;
  }
  if (isLast) lastLevelScore++;
  updateInfo();
  subStatusEl.textContent = 'מצוין! סיימת את הסבב';

  setTimeout(() => {
    if (!isLast && successCount >= SUCCESSES_TO_ADVANCE) {
      showLevelUp();
    } else if (descendQueued && levelIdx > 0) {
      levelIdx--;
      successCount = 0;
      missStreak = 0;
      descendQueued = false;
      startRound();
    } else {
      startRound();
    }
  }, ROUND_END_DELAY_MS);
}

function showLevelUp() {
  modalEmoji.textContent = '🌟';
  modalTitle.textContent = 'רמה חדשה!';
  const next = LEVELS[levelIdx + 1];
  modalText.textContent = `עולים ל-${next.totalCards} קלפים`;
  modalBtn.textContent = 'המשך';
  modalBtn.onclick = () => {
    overlay.classList.remove('show');
    levelIdx++;
    successCount = 0;
    missStreak = 0;
    startRound();
  };
  overlay.classList.add('show');
  playLevelUp();
}

function updateInfo() {
  levelNumEl.textContent = levelIdx + 1;
  const isLast = levelIdx === LEVELS.length - 1;
  if (isLast) {
    progressLabelEl.textContent = 'ניקוד:';
    progressNumEl.textContent = lastLevelScore;
  } else {
    progressLabelEl.textContent = 'נכונים:';
    progressNumEl.textContent = `${successCount}/${SUCCESSES_TO_ADVANCE}`;
  }
}

function updateSubStatus() {
  subStatusEl.textContent = `מצאת ${foundCount} מתוך ${totalMatchesInRound}`;
}

// --- Inactivity ---
function resetInactivity() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(showInactivityDialog, INACTIVITY_MS);
}
function showInactivityDialog() {
  if (state !== 'playing') return;
  state = 'paused';
  const o = document.createElement('div');
  o.className = 'end-overlay';
  o.innerHTML = '<div class="end-modal"><h2>להמשיך לשחק?</h2><p>12 שניות ללא פעילות</p><div class="ebtns"><button class="yes">כן, להמשיך</button><button class="no">לא, לסיים</button></div></div>';
  let to;
  const cleanup = (choice) => {
    if (to) { clearTimeout(to); to = null; }
    if (o.parentNode) o.remove();
    if (choice === 'yes') { state = 'playing'; resetInactivity(); }
    else endGame();
  };
  o.querySelector('.yes').addEventListener('click', () => cleanup('yes'));
  o.querySelector('.no').addEventListener('click', () => cleanup('no'));
  to = setTimeout(() => cleanup('no'), AUTO_END_MS);
  document.body.appendChild(o);
}

// --- Reset / End ---
btnReset.addEventListener('click', () => {
  getAudio();
  overlay.classList.remove('show');
  levelIdx = 0;
  successCount = 0;
  missStreak = 0;
  lastLevelScore = 0;
  recentThemes = [];
  descendQueued = false;
  startRound();
});

function confirmEndGame() {
  clearTimeout(inactivityTimer);
  const prev = state;
  state = 'paused';
  const o = document.createElement('div');
  o.className = 'end-overlay';
  o.innerHTML = '<div class="end-modal"><h2>לסיים את המשחק?</h2><div class="ebtns"><button class="yes">כן</button><button class="no">לא</button></div></div>';
  o.querySelector('.yes').addEventListener('click', () => { o.remove(); endGame(); });
  o.querySelector('.no').addEventListener('click', () => {
    o.remove();
    state = prev;
    resetInactivity();
  });
  document.body.appendChild(o);
}
function endGame() {
  clearTimeout(inactivityTimer);
  document.body.innerHTML = '<div class="goodbye"><div class="wave">👋</div><div class="text">להתראות!</div></div>';
  setTimeout(() => { location.href = 'index.html'; }, 1500);
}
btnEnd.addEventListener('click', confirmEndGame);

window.addEventListener('resize', layoutBoard);

startRound();
</script>
</body>
</html>

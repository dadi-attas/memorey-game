<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>משחק זיכרון</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: #fff;
    user-select: none;
  }

  #app {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 10px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex: 0 0 auto;
    height: 56px;
  }

  .btn {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.35);
    color: #fff;
    padding: 10px 18px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    white-space: nowrap;
    backdrop-filter: blur(6px);
  }

  .btn:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn.hidden {
    visibility: hidden;
  }

  .info {
    flex: 1 1 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    font-size: 18px;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
  }

  .info span b {
    color: #ffd86b;
    font-size: 22px;
    margin-inline-start: 6px;
  }

  #board-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    min-width: 0;
  }

  #board {
    display: grid;
    gap: var(--gap, 10px);
    width: 100%;
    height: 100%;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    cursor: pointer;
    perspective: 800px;
  }

  .card-inner {
    position: absolute;
    inset: 0;
    transition: transform 0.45s;
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.28);
    font-size: var(--symbol-size, 48px);
  }

  .card-back {
    background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%);
    color: rgba(255, 255, 255, 0.85);
    font-weight: 900;
    font-size: calc(var(--symbol-size, 48px) * 0.6);
  }

  .card-front {
    background: #fff;
    color: #222;
    transform: rotateY(180deg);
  }

  .card.matched .card-front {
    background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
    color: #fff;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    backdrop-filter: blur(4px);
  }

  #overlay.show {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 30px 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 90%;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }

  .modal h2 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .modal p {
    font-size: 18px;
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .modal .btn {
    background: #fff;
    color: #333;
    font-size: 18px;
    padding: 12px 28px;
  }

  .modal .btn:hover {
    background: #ffd86b;
  }

  /* End-game button & overlay */
  .btn-end {
    background: linear-gradient(135deg, #ff8a8a 0%, #e55b5b 100%) !important;
    border-color: rgba(255,255,255,0.55) !important;
    color: #fff !important;
  }
  .end-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; backdrop-filter: blur(4px);
  }
  .end-modal {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 28px 38px; border-radius: 20px; text-align: center;
    max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    color: #fff;
  }
  .end-modal h2 { font-size: 28px; margin-bottom: 18px; font-weight: 800; }
  .end-modal .ebtns { display: flex; gap: 14px; justify-content: center; }
  .end-modal button {
    padding: 12px 30px; font-size: 18px; font-weight: 800;
    border-radius: 12px; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.55);
    font-family: inherit;
  }
  .end-modal button.yes { background: #7dd87d; color: #fff; }
  .end-modal button.no  { background: #fff; color: #333; }
  .goodbye {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff;
    z-index: 99999;
  }
  .goodbye .wave { font-size: 110px; margin-bottom: 12px; }
  .goodbye .text { font-size: 46px; font-weight: 800; }
</style>
</head>
<body>
<div id="app">
  <header>
    <button id="btn-reset" class="btn">איפוס משחק</button>
    <div class="info">
      <span>רמה: <b id="level-num">1</b></span>
      <span>זוגות: <b id="pairs-num">0/0</b></span>
      <span>ניסיונות: <b id="tries-num">0</b></span>
    </div>
    <button id="btn-prev" class="btn hidden">חזור לרמה קודמת</button>
    <button id="btn-end" class="btn btn-end">סיום</button>
  </header>
  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<div id="overlay">
  <div class="modal">
    <h2 id="modal-title">כל הכבוד!</h2>
    <p id="modal-text">סיימת את הרמה</p>
    <button id="modal-btn" class="btn">לרמה הבאה</button>
  </div>
</div>

<script>
  const LEVELS = [8, 12, 16, 20, 24];
  const SYMBOLS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🦄','🐙','🦀','🦉','🦋','🐢','🦖','🐳','🐊'];

  const boardEl = document.getElementById('board');
  const levelNumEl = document.getElementById('level-num');
  const pairsNumEl = document.getElementById('pairs-num');
  const triesNumEl = document.getElementById('tries-num');
  const btnReset = document.getElementById('btn-reset');
  const btnPrev = document.getElementById('btn-prev');
  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modal-title');
  const modalText = document.getElementById('modal-text');
  const modalBtn = document.getElementById('modal-btn');

  let levelIdx = 0;
  let cards = [];
  let firstCard = null;
  let secondCard = null;
  let lock = false;
  let matchedPairs = 0;
  let tries = 0;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Choose rows/cols for landscape layout based on available width/height.
  function chooseGrid(n, w, h) {
    let best = null;
    for (let rows = 1; rows <= n; rows++) {
      if (n % rows !== 0) continue;
      const cols = n / rows;
      // Target a card aspect close to 1:1 (slight preference for landscape).
      const cardW = w / cols;
      const cardH = h / rows;
      const cardSize = Math.min(cardW, cardH);
      // Prefer more columns than rows (landscape), and larger resulting card size.
      const landscapeBonus = cols >= rows ? 1 : 0.6;
      const score = cardSize * landscapeBonus;
      if (!best || score > best.score) {
        best = { rows, cols, score, cardSize };
      }
    }
    return best;
  }

  function layoutBoard() {
    const n = LEVELS[levelIdx];
    const wrap = document.getElementById('board-wrap');
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if (w === 0 || h === 0) return;

    const gap = 10;
    // Account for gaps during calc by trying a few candidates.
    let best = null;
    for (let rows = 1; rows <= n; rows++) {
      if (n % rows !== 0) continue;
      const cols = n / rows;
      const availW = w - gap * (cols - 1);
      const availH = h - gap * (rows - 1);
      const cardW = availW / cols;
      const cardH = availH / rows;
      const cardSize = Math.min(cardW, cardH);
      if (cardSize <= 0) continue;
      const landscapeBonus = cols >= rows ? 1 : 0.65;
      const score = cardSize * landscapeBonus;
      if (!best || score > best.score) {
        best = { rows, cols, cardSize, score };
      }
    }
    if (!best) return;

    const boardW = best.cols * best.cardSize + gap * (best.cols - 1);
    const boardH = best.rows * best.cardSize + gap * (best.rows - 1);
    boardEl.style.width = boardW + 'px';
    boardEl.style.height = boardH + 'px';
    boardEl.style.gridTemplateColumns = `repeat(${best.cols}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${best.rows}, 1fr)`;
    boardEl.style.setProperty('--gap', gap + 'px');
    boardEl.style.setProperty('--symbol-size', Math.floor(best.cardSize * 0.55) + 'px');
  }

  function buildLevel() {
    const n = LEVELS[levelIdx];
    const pairs = n / 2;
    const chosen = shuffle([...SYMBOLS]).slice(0, pairs);
    const deck = shuffle([...chosen, ...chosen]);

    matchedPairs = 0;
    tries = 0;
    firstCard = null;
    secondCard = null;
    lock = false;
    cards = [];

    boardEl.innerHTML = '';
    deck.forEach((sym, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.symbol = sym;
      card.dataset.index = idx;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">?</div>
          <div class="card-face card-front">${sym}</div>
        </div>`;
      card.addEventListener('click', () => onCardClick(card));
      boardEl.appendChild(card);
      cards.push(card);
    });

    levelNumEl.textContent = levelIdx + 1;
    pairsNumEl.textContent = `0/${pairs}`;
    triesNumEl.textContent = '0';
    btnPrev.classList.toggle('hidden', levelIdx === 0);

    requestAnimationFrame(layoutBoard);
  }

  function onCardClick(card) {
    if (lock) return;
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

    card.classList.add('flipped');

    if (!firstCard) {
      firstCard = card;
      return;
    }
    secondCard = card;
    lock = true;
    tries++;
    triesNumEl.textContent = tries;

    const match = firstCard.dataset.symbol === secondCard.dataset.symbol;
    if (match) {
      firstCard.classList.add('matched');
      secondCard.classList.add('matched');
      matchedPairs++;
      pairsNumEl.textContent = `${matchedPairs}/${LEVELS[levelIdx] / 2}`;
      resetTurn();
      if (matchedPairs === LEVELS[levelIdx] / 2) {
        setTimeout(onLevelComplete, 550);
      }
    } else {
      setTimeout(() => {
        firstCard.classList.remove('flipped');
        secondCard.classList.remove('flipped');
        resetTurn();
      }, 900);
    }
  }

  function resetTurn() {
    firstCard = null;
    secondCard = null;
    lock = false;
  }

  function onLevelComplete() {
    const isLast = levelIdx === LEVELS.length - 1;
    if (isLast) {
      modalTitle.textContent = 'סיימת את כל הרמות!';
      modalText.textContent = `ניסיונות סופיים: ${tries}. אלוף!`;
      modalBtn.textContent = 'התחל מחדש';
      modalBtn.dataset.action = 'restart';
    } else {
      modalTitle.textContent = 'כל הכבוד!';
      modalText.textContent = `עברת את הרמה ב-${tries} ניסיונות`;
      modalBtn.textContent = 'לרמה הבאה';
      modalBtn.dataset.action = 'next';
    }
    overlay.classList.add('show');
  }

  modalBtn.addEventListener('click', () => {
    const action = modalBtn.dataset.action;
    overlay.classList.remove('show');
    if (action === 'next') {
      levelIdx = Math.min(levelIdx + 1, LEVELS.length - 1);
    } else {
      levelIdx = 0;
    }
    buildLevel();
  });

  btnReset.addEventListener('click', () => {
    overlay.classList.remove('show');
    levelIdx = 0;
    buildLevel();
  });

  btnPrev.addEventListener('click', () => {
    if (levelIdx === 0) return;
    overlay.classList.remove('show');
    levelIdx--;
    buildLevel();
  });

  window.addEventListener('resize', layoutBoard);
  window.addEventListener('orientationchange', () => setTimeout(layoutBoard, 150));

  buildLevel();

  // --- End-game flow ---
  function confirmEndGame() {
    const overlay = document.createElement('div');
    overlay.className = 'end-overlay';
    overlay.innerHTML = '<div class="end-modal"><h2>לסיים את המשחק?</h2><div class="ebtns"><button class="yes">כן</button><button class="no">לא</button></div></div>';
    overlay.querySelector('.yes').addEventListener('click', () => { overlay.remove(); endGame(); });
    overlay.querySelector('.no').addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
  }
  function endGame() {
    document.body.innerHTML = '<div class="goodbye"><div class="wave">👋</div><div class="text">להתראות!</div></div>';
    setTimeout(() => { location.href = 'index.html'; }, 1500);
  }
  document.getElementById('btn-end').addEventListener('click', confirmEndGame);
</script>
</body>
</html>
